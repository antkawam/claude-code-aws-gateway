name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SQLX_OFFLINE: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Server binary (linux only, x86_64 + aarch64)
  # Built with musl for static linking
  # ---------------------------------------------------------------------------
  server:
    name: Server (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - arch: aarch64
            target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-server-${{ matrix.arch }}
          save-if: true
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build server
        run: cargo build --release --bin ccag-server --target ${{ matrix.target }} --locked
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ccag-server-linux-${{ matrix.arch }}.tar.gz ccag-server
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.arch }}
          path: ccag-server-linux-${{ matrix.arch }}.tar.gz

  # ---------------------------------------------------------------------------
  # CLI binary (linux, macOS, Windows × x86_64 + aarch64)
  # Native builds — thin crate, fast compile
  # ---------------------------------------------------------------------------
  cli:
    name: CLI (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - os: linux
            arch: aarch64
            target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: x86_64
            target: x86_64-apple-darwin
            runner: macos-latest
          - os: darwin
            arch: aarch64
            target: aarch64-apple-darwin
            runner: macos-latest
          - os: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
          - os: windows
            arch: aarch64
            target: aarch64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-cli-${{ matrix.os }}-${{ matrix.arch }}
          workspaces: cli
          save-if: true
      - name: Install musl tools
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build CLI
        run: cargo build --release --package ccag-cli --target ${{ matrix.target }} --locked
      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ccag-cli-${{ matrix.os }}-${{ matrix.arch }}.tar.gz ccag
      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/ccag.exe" -DestinationPath "ccag-cli-windows-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: ccag-cli-${{ matrix.os }}-${{ matrix.arch }}.*

  # ---------------------------------------------------------------------------
  # Docker image (multi-arch linux/amd64 + linux/arm64) → GHCR
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          merge-multiple: true
      - name: Prepare binaries
        run: |
          mkdir -p build/linux/amd64 build/linux/arm64
          tar xzf ccag-server-linux-x86_64.tar.gz -C build/linux/amd64
          tar xzf ccag-server-linux-aarch64.tar.gz -C build/linux/arm64
          chmod +x build/linux/amd64/ccag-server build/linux/arm64/ccag-server
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # GitHub Release with all artifacts + checksums
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [server, cli, docker]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{server,cli}-*"
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum ccag-*.tar.gz ccag-*.zip > checksums-sha256.txt 2>/dev/null || sha256sum ccag-*.tar.gz > checksums-sha256.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ccag-*.tar.gz
            ccag-*.zip
            checksums-sha256.txt

name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Gateway (API proxy)
        - Admin Portal
        - CLI (ccag)
        - CDK / Infrastructure
        - Authentication (OIDC/keys)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Deploy with ...
        2. Configure ...
        3. Send request ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - CCAG version: v1.0.0
        - Deployment: CDK / Docker Compose / other
        - AWS region: us-west-2
        - Claude Code version: ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (redact sensitive info).
      render: shell
    validations:
      required: false

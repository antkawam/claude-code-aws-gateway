title: Claude Code AWS Gateway
tagline: Self-Hosted Bedrock Gateway with Team Budgets & SSO
description: Self-hosted API gateway for Claude Code on Amazon Bedrock. Team API keys, per-user budgets, OIDC SSO, rate limiting, and an admin portal.
url: "https://antkawam.github.io"
baseurl: "/claude-code-aws-gateway"
remote_theme: pages-themes/minimal@v0.2.0

plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-seo-tag

author: antkawam
twitter:
  card: summary_large_image
social:
  name: Claude Code AWS Gateway
  links:
    - https://github.com/antkawam/claude-code-aws-gateway
logo: /docs/images/og-preview.png

exclude:
  - src
  - cli
  - infra/node_modules
  - target
  - tests
  - static
  - Cargo.toml
  - Cargo.lock
  - Makefile
  - Dockerfile
  - Dockerfile.release
  - docker-compose.yml
  - docker-compose.test.yml
  - build.rs
  - .sqlx
  - .github
  - .claude
  - .env.example
  - environments.json.example
  - deny.toml

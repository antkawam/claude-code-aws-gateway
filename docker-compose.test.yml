services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proxy_test
      POSTGRES_USER: proxy
      POSTGRES_PASSWORD: testpass
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy -d proxy_test"]
      interval: 1s
      timeout: 5s
      retries: 30
